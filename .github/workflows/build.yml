name: 自动打包 Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖（不需要编译任何原生模块）
        run: npm install

      - name: 打包成 EXE
        run: npm run dist

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Music-Overlay-安装包
          path: dist/*.exe
