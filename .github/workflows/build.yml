name: 自动打包 Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 1. 下载代码
        uses: actions/checkout@v4

      - name: 2. 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 3. 安装依赖
        run: npm install

      - name: 4. 打包成 EXE
        run: npm run dist

      - name: 5. 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Music-Overlay-安装包
          path: dist/*.exe
